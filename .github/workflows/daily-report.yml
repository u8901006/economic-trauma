name: Economic Trauma Daily Report

on:
  schedule:
    - cron: "50 9 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Target date (YYYY-MM-DD), leave empty for today"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Cache node_modules
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Determine date
        id: date
        env:
          INPUT_DATE: "${{ github.event.inputs.date }}"
        run: |
          if [ -n "$INPUT_DATE" ]; then
            echo "target=$INPUT_DATE" >> "$GITHUB_OUTPUT"
          else
            TARGET=$(TZ=Asia/Taipei date +%Y-%m-%d)
            echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch papers from PubMed
        run: |
          python scripts/fetch_papers.py \
            --days 7 \
            --max-papers 60 \
            --output papers.json
        continue-on-error: true

      - name: Check papers data
        id: papers
        run: |
          if [ -f papers.json ] && grep -q '"count"' papers.json; then
            COUNT=$(python -c "import json; print(json.load(open('papers.json')).get('count',0))")
            echo "count=$COUNT" >> "$GITHUB_OUTPUT"
            echo "Papers found: $COUNT"
          else
            echo "count=0" >> "$GITHUB_OUTPUT"
            TARGET_DATE="${{ steps.date.outputs.target }}"
            echo "{\"date\":\"$TARGET_DATE\",\"count\":0,\"papers\":[]}" > papers.json
            echo "No papers found, will generate empty report"
          fi

      - name: Generate report with Zhipu AI
        env:
          ZHIPU_API_KEY: "${{ secrets.ZHIPU_API_KEY }}"
          ZHIPU_API_BASE: "https://open.bigmodel.cn/api/coding/paas/v4"
        run: |
          node scripts/generate_report.mjs \
            --input papers.json \
            --output docs/economic-trauma-${{ steps.date.outputs.target }}.html \
            --api-key "$ZHIPU_API_KEY"

      - name: Generate index page
        run: node scripts/generate_index.mjs

      - name: Commit and push
        env:
          TARGET_DATE: "${{ steps.date.outputs.target }}"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ data/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "economic trauma daily report: $TARGET_DATE"
          git pull --rebase origin main
          git push

      - name: Summary
        env:
          TARGET_DATE: "${{ steps.date.outputs.target }}"
          PAPER_COUNT: "${{ steps.papers.outputs.count }}"
        run: |
          echo "### Economic Trauma Daily Report" >> "$GITHUB_STEP_SUMMARY"
          echo "**Date:** $TARGET_DATE" >> "$GITHUB_STEP_SUMMARY"
          echo "**Papers analyzed:** $PAPER_COUNT" >> "$GITHUB_STEP_SUMMARY"
          echo "**Report:** [economic-trauma-$TARGET_DATE.html](https://u8901006.github.io/economic-trauma/economic-trauma-$TARGET_DATE.html)" >> "$GITHUB_STEP_SUMMARY"
